<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мій прапор — myCountryAndFlag</title>
<style>
  :root{
    --bg:#eef1f6;
    --card:#ffffff;
    --ink:#1f2933;
    --muted:#7b8794;
    --line:#e1e6ee;
    --accent:#1d4ed8;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.4;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:520px;margin:0 auto;padding:16px 14px 40px;}

  header{text-align:center;margin:6px 0 16px;}
  header h1{font-size:1.4rem;margin:0;font-weight:800;letter-spacing:.2px;}
  header p{margin:5px 0 0;color:var(--muted);font-size:.9rem;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:14px;box-shadow:0 6px 20px rgba(31,41,51,.05);
  }
  .card h2{
    font-size:.72rem;text-transform:uppercase;letter-spacing:.7px;
    color:var(--muted);margin:0 0 12px;font-weight:700;
  }

  /* режими */
  .modes{display:flex;gap:8px;margin-bottom:14px;}
  .modes button{
    flex:1;padding:11px;border-radius:12px;border:2px solid var(--line);
    background:#f7f9fc;font-weight:700;font-size:.9rem;cursor:pointer;color:var(--muted);
  }
  .modes button.active{border-color:var(--accent);background:#eef3ff;color:var(--accent);}

  /* налаштування */
  .setup-block{margin-bottom:16px;}
  .setup-label{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
  .setup-block label{display:flex;align-items:center;gap:10px;font-size:.95rem;padding:7px 0;cursor:pointer;user-select:none;}
  .setup-block input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex:none;}
  .cont-all{border-bottom:1px dashed var(--line);margin-bottom:4px;padding-bottom:4px !important;font-weight:700;}
  .cnt{color:var(--muted);font-size:.82rem;font-weight:600;}
  .setup-total{font-size:.85rem;color:var(--accent);font-weight:700;margin-top:10px;}

  /* картка гри */
  .ch-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .ch-target{font-size:.9rem;color:var(--muted);}
  .ch-target b{display:block;font-size:1.55rem;color:var(--ink);font-weight:800;margin-top:2px;}
  .ch-score{font-size:.78rem;color:var(--muted);white-space:nowrap;text-align:right;}
  .ch-score b{color:var(--accent);font-size:1.3rem;}
  .score-detail{font-size:.76rem;color:var(--muted);margin-bottom:10px;}

  .feedback{padding:10px 12px;border-radius:10px;font-size:.88rem;font-weight:600;margin-bottom:10px;}
  .feedback.ok{background:#e7f6ec;color:#1e7a3d;border:1px solid #b6e2c4;}
  .feedback.err{background:#fdeef0;color:#b23046;border:1px solid #f3c9d0;}
  .feedback.neutral{background:#f7f9fc;color:var(--ink);border:1px solid var(--line);font-weight:600;}
  .fb-verdict{font-size:.98rem;font-weight:800;margin-bottom:6px;}
  .fb-line{display:flex;align-items:center;gap:6px;font-size:.86rem;padding:1px 0;}
  .fb-line b{font-size:1rem;}
  .fb-note{opacity:.7;font-weight:600;}
  .mark-ok{color:#1e7a3d;}
  .mark-no{color:#b23046;}

  .correct{margin-bottom:12px;}
  .correct-label{font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:6px;}
  .compare{display:flex;gap:10px;}
  .compare > div{flex:1;min-width:0;}
  .compare .flag{max-width:100%;box-shadow:0 2px 8px rgba(31,41,51,.16);}

  .ch-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .newgame{margin-top:10px;width:100%;}

  /* полотнище */
  .stage{display:flex;justify-content:center;}
  .flag{
    width:100%;max-width:420px;border-radius:8px;overflow:hidden;
    box-shadow:0 4px 16px rgba(31,41,51,.18);border:1px solid rgba(0,0,0,.08);
  }
  .flag svg{display:block;width:100%;height:auto;}
  .flag rect[data-index]{cursor:pointer;}
  .hint{font-size:.78rem;color:var(--muted);text-align:center;margin-top:10px;}

  /* смуги: один компактний рядок */
  .stripes{display:flex;align-items:center;gap:10px;}
  .stripes-label{font-size:.8rem;color:var(--muted);font-weight:700;}
  .dir-toggle{display:flex;gap:6px;}
  .dir-toggle button{
    width:46px;height:38px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;border:2px solid var(--line);background:#f7f9fc;color:var(--muted);cursor:pointer;padding:0;
  }
  .dir-toggle button.active{border-color:var(--accent);background:#eef3ff;color:var(--accent);}
  .stepper{display:flex;align-items:center;gap:10px;margin-left:auto;}
  .stepper button{
    width:40px;height:38px;border-radius:10px;border:2px solid var(--line);
    background:#f7f9fc;font-size:1.3rem;font-weight:700;cursor:pointer;color:var(--ink);line-height:1;
  }
  .stepper #nVal{min-width:24px;text-align:center;font-weight:800;font-size:1.15rem;}

  /* статус */
  .status{
    font-size:.85rem;color:var(--ink);background:#f7f9fc;border:1px solid var(--line);
    border-radius:10px;padding:9px 11px;margin-bottom:12px;
  }
  .status b{color:var(--accent);}

  /* групи кольорів */
  .families{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .fam{
    display:flex;align-items:center;gap:7px;padding:6px 12px 6px 7px;
    border:2px solid var(--line);border-radius:999px;background:#f7f9fc;cursor:pointer;font-size:.8rem;color:var(--ink);
  }
  .fam .dot{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.18);}
  .fam.active{border-color:var(--accent);background:#eef3ff;color:var(--accent);font-weight:700;}

  /* відтінки */
  .shades{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px;}
  .swatch{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;padding:0;font:inherit;}
  .swatch .tile{
    display:block;width:100%;aspect-ratio:1/1;border-radius:10px;
    border:1px solid rgba(0,0,0,.14);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .swatch .cap{font-size:.58rem;color:var(--muted);text-align:center;line-height:1.05;}
  .swatch.tapped .tile{outline:3px dashed var(--accent);outline-offset:2px;}

  /* дії / кнопки */
  .actions{display:flex;gap:8px;}
  .btn{
    padding:12px;border-radius:12px;border:1px solid var(--line);
    background:#f7f9fc;color:var(--ink);font-weight:600;font-size:.9rem;cursor:pointer;
  }
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.wide{width:100%;}
  .actions .btn{flex:1;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn:active{transform:translateY(1px);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏳️ Мій прапор</h1>
    <p>Збери заданий прапор зі смуг і кольорів — або твори власний</p>
  </header>

  <div class="modes" id="modes">
    <button data-mode="game">🎯 Гра</button>
    <button data-mode="constructor">🎨 Конструктор</button>
  </div>

  <!-- НАЛАШТУВАННЯ (перед грою) -->
  <div class="card" id="setupCard">
    <h2>Перед грою</h2>
    <div class="setup-block">
      <div class="setup-label">Континенти</div>
      <label class="cont-all"><input type="checkbox" id="cont-all"> Усі континенти <span class="cnt" id="cnt-all"></span></label>
      <div class="cont-list">
        <label><input type="checkbox" data-cont="Європа"> Європа <span class="cnt" data-cnt="Європа"></span></label>
        <label><input type="checkbox" data-cont="Азія"> Азія <span class="cnt" data-cnt="Азія"></span></label>
        <label><input type="checkbox" data-cont="Африка"> Африка <span class="cnt" data-cnt="Африка"></span></label>
        <label><input type="checkbox" data-cont="Америка"> Америка <span class="cnt" data-cnt="Америка"></span></label>
      </div>
      <div class="setup-total" id="setupTotal"></div>
    </div>
    <div class="setup-block">
      <div class="setup-label">Складність</div>
      <label><input type="checkbox" id="setupExact"> Точний відтінок <span style="color:var(--muted);font-size:.82rem">(інакше — будь-який відтінок)</span></label>
      <label><input type="checkbox" id="setupComplex"> Нерівні смуги <span style="color:var(--muted);font-size:.82rem">(Таїланд, Латвія, Колумбія…)</span></label>
    </div>
    <button class="btn primary wide" id="startBtn">Почати гру ▶</button>
  </div>

  <!-- ГРА -->
  <div class="card" id="gameCard">
    <div class="ch-top">
      <div class="ch-target">Збери прапор:<b id="targetName">—</b></div>
      <div class="ch-score">Рахунок<br><b id="score">0</b></div>
    </div>
    <div class="score-detail" id="scoreDetail"></div>
    <div class="feedback" id="feedback" style="display:none"></div>
    <div class="correct" id="correct" style="display:none"></div>
    <div class="ch-actions" id="chActions"></div>
    <button class="btn newgame" id="newGameBtn">↺ Нова гра (змінити налаштування)</button>
  </div>

  <!-- КОНСТРУКТОР ПРАПОРА (спільний для обох режимів) -->
  <div id="builder">
    <div class="card">
      <div class="stage"><div class="flag" id="flag"></div></div>
      <div class="hint">Торкнись секції прапора, щоб її обрати</div>
    </div>

    <div class="card">
      <div class="stripes">
        <span class="stripes-label">Смуги</span>
        <div class="dir-toggle">
          <button data-dir="v" title="Вертикальні смуги"><svg width="20" height="15" viewBox="0 0 20 15" fill="currentColor"><rect x="0" y="0" width="5.5" height="15" rx="1"/><rect x="7.25" y="0" width="5.5" height="15" rx="1"/><rect x="14.5" y="0" width="5.5" height="15" rx="1"/></svg></button>
          <button data-dir="h" title="Горизонтальні смуги"><svg width="20" height="15" viewBox="0 0 20 15" fill="currentColor"><rect x="0" y="0" width="20" height="4" rx="1"/><rect x="0" y="5.5" width="20" height="4" rx="1"/><rect x="0" y="11" width="20" height="4" rx="1"/></svg></button>
        </div>
        <div class="stepper">
          <button id="nMinus" aria-label="менше смуг">−</button>
          <span id="nVal">1</span>
          <button id="nPlus" aria-label="більше смуг">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Колір обраної секції</h2>
      <div class="status" id="status"></div>
      <div class="families" id="families"></div>
      <div class="shades" id="shades"></div>
    </div>

    <div class="actions">
      <button class="btn" id="reset">Очистити кольори</button>
    </div>
  </div>
</div>

<script>
  "use strict";

  const W = 300, H = 200;      // полотно 3:2
  const DEFAULT = "#FFFFFF";
  const MAXN = 9;              // макс. кількість смуг
  const CONTINENTS = ["Європа", "Азія", "Африка", "Америка"];

  const FAMILY_META = {
    red:    { name:"Червоний",     chip:"#D52B1E" },
    blue:   { name:"Синій",        chip:"#0057B7" },
    green:  { name:"Зелений",      chip:"#009246" },
    yellow: { name:"Жовтий",       chip:"#FFD100" },
    orange: { name:"Помаранчевий", chip:"#FF7F27" },
    white:  { name:"Білий",        chip:"#FFFFFF" },
    black:  { name:"Чорний",       chip:"#111111" },
  };
  const FAMILY_ORDER = ["red","blue","green","yellow","orange","white","black"];

  // База «створюваних» прапорів — рівні смуги (dir: напрям, n: кількість).
  // Порядок кольорів: вертикальні — зліва направо; горизонтальні — згори вниз.
  const R = (fam, h) => ({ fam, h });
  const FLAGS = [
    // Європа
    { country:"Україна",    continent:"Європа", dir:"h", n:2, sections:[R("blue","#0057B7"),  R("yellow","#FFD700")] },
    { country:"Польща",     continent:"Європа", dir:"h", n:2, sections:[R("white","#FFFFFF"), R("red","#DC143C")] },
    { country:"Франція",    continent:"Європа", dir:"v", n:3, sections:[R("blue","#002395"),  R("white","#FFFFFF"), R("red","#ED2939")] },
    { country:"Італія",     continent:"Європа", dir:"v", n:3, sections:[R("green","#009246"), R("white","#FFFFFF"), R("red","#CE2B37")] },
    { country:"Ірландія",   continent:"Європа", dir:"v", n:3, sections:[R("green","#169B62"), R("white","#FFFFFF"), R("orange","#FF883E")] },
    { country:"Бельгія",    continent:"Європа", dir:"v", n:3, sections:[R("black","#000000"), R("yellow","#FDDA24"), R("red","#EF3340")] },
    { country:"Румунія",    continent:"Європа", dir:"v", n:3, sections:[R("blue","#002B7F"),  R("yellow","#FCD116"), R("red","#CE1126")] },
    { country:"Німеччина",  continent:"Європа", dir:"h", n:3, sections:[R("black","#000000"), R("red","#DD0000"),   R("yellow","#FFCE00")] },
    { country:"Нідерланди", continent:"Європа", dir:"h", n:3, sections:[R("red","#AE1C28"),   R("white","#FFFFFF"), R("blue","#21468B")] },
    { country:"Угорщина",   continent:"Європа", dir:"h", n:3, sections:[R("red","#CD2A3E"),   R("white","#FFFFFF"), R("green","#477050")] },
    { country:"Австрія",    continent:"Європа", dir:"h", n:3, sections:[R("red","#ED2939"),   R("white","#FFFFFF"), R("red","#ED2939")] },
    { country:"Болгарія",   continent:"Європа", dir:"h", n:3, sections:[R("white","#FFFFFF"), R("green","#00966E"), R("red","#D62612")] },
    { country:"Литва",      continent:"Європа", dir:"h", n:3, sections:[R("yellow","#FDB913"),R("green","#006A44"), R("red","#C1272D")] },
    { country:"Естонія",    continent:"Європа", dir:"h", n:3, sections:[R("blue","#0072CE"),  R("black","#000000"), R("white","#FFFFFF")] },
    { country:"Люксембург", continent:"Європа", dir:"h", n:3, sections:[R("red","#ED2939"),   R("white","#FFFFFF"), R("blue","#00A1DE")] },
    { country:"Латвія",     continent:"Європа", dir:"h", n:5, sections:[R("red","#9E3039"),   R("red","#9E3039"),   R("white","#FFFFFF"), R("red","#9E3039"), R("red","#9E3039")] },
    // Азія
    { country:"Індонезія",  continent:"Азія",   dir:"h", n:2, sections:[R("red","#CE1126"),   R("white","#FFFFFF")] },
    { country:"Вірменія",   continent:"Азія",   dir:"h", n:3, sections:[R("red","#D90012"),   R("blue","#0033A0"),  R("orange","#F2A800")] },
    { country:"Ємен",       continent:"Азія",   dir:"h", n:3, sections:[R("red","#CE1126"),   R("white","#FFFFFF"), R("black","#000000")] },
    { country:"Таїланд",    continent:"Азія",   dir:"h", n:6, sections:[R("red","#A51931"),   R("white","#FFFFFF"), R("blue","#2D2A4A"), R("blue","#2D2A4A"), R("white","#FFFFFF"), R("red","#A51931")] },
    // Африка
    { country:"Нігерія",    continent:"Африка", dir:"v", n:3, sections:[R("green","#008751"), R("white","#FFFFFF"), R("green","#008751")] },
    { country:"Малі",       continent:"Африка", dir:"v", n:3, sections:[R("green","#14B53A"), R("yellow","#FCD116"),R("red","#CE1126")] },
    { country:"Гвінея",     continent:"Африка", dir:"v", n:3, sections:[R("red","#CE1126"),   R("yellow","#FCD116"),R("green","#009460")] },
    { country:"Габон",      continent:"Африка", dir:"h", n:3, sections:[R("green","#009E60"), R("yellow","#FCD116"),R("blue","#3A75C4")] },
    { country:"Чад",        continent:"Африка", dir:"v", n:3, sections:[R("blue","#002664"),  R("yellow","#FECB00"),R("red","#C60C30")] },
    { country:"Гамбія",     continent:"Африка", dir:"h", n:5, sections:[R("red","#CE1126"), R("white","#FFFFFF"), R("blue","#0C1C8C"), R("white","#FFFFFF"), R("green","#3A7728")], accept:[[R("red","#CE1126"), R("blue","#0C1C8C"), R("green","#3A7728")]] },
    { country:"Ботсвана",   continent:"Африка", dir:"h", n:5, sections:[R("blue","#75AADB"), R("white","#FFFFFF"), R("black","#000000"), R("white","#FFFFFF"), R("blue","#75AADB")], accept:[[R("blue","#75AADB"), R("black","#000000"), R("blue","#75AADB")]] },
    // Америка
    { country:"Перу",       continent:"Америка",dir:"v", n:3, sections:[R("red","#D91023"),   R("white","#FFFFFF"), R("red","#D91023")] },
    { country:"Болівія",    continent:"Америка",dir:"h", n:3, sections:[R("red","#D52B1E"),   R("yellow","#F9E300"),R("green","#007934")] },
    { country:"Колумбія",   continent:"Америка",dir:"h", n:4, sections:[R("yellow","#FCD116"),R("yellow","#FCD116"),R("blue","#003893"), R("red","#CE1126")] },
  ];

  // Палітра з бази + «представницька» країна відтінку (для підписів у Конструкторі).
  function buildPalette(){
    const byFam = {};
    const firstCountry = {};
    FAMILY_ORDER.forEach((f) => { byFam[f] = []; });
    FLAGS.forEach((fl) => fl.sections.forEach((s) => {
      const key = s.h.toLowerCase();
      if (!(key in firstCountry)){ firstCountry[key] = fl.country; byFam[s.fam].push(s.h); }
    }));
    const label = (h) => {
      const key = h.toLowerCase();
      if (key === "#ffffff" || key === "#000000") return "загальний";
      return firstCountry[key] || "";
    };
    return FAMILY_ORDER
      .filter((f) => byFam[f].length)
      .map((f) => ({ key:f, name:FAMILY_META[f].name, chip:FAMILY_META[f].chip,
                     shades: byFam[f].map((h) => ({ h, country: label(h) })) }));
  }
  const FAMILIES = buildPalette();

  function familyOf(hex){
    const H0 = String(hex).toLowerCase();
    for (const f of FAMILIES){
      if (f.shades.some((s) => s.h.toLowerCase() === H0)) return f.key;
    }
    return null;
  }

  const state = {
    mode: "game",              // "game" | "constructor"
    gameStarted: false,
    exact: false,              // задається на старті
    continents: new Set(CONTINENTS),
    includeComplex: false,
    pool: FLAGS.slice(),
    dir: null, n: 1,
    colors: [DEFAULT],
    selected: 0,
    showSel: false,
    family: "blue",
    target: null,
    lastCountry: null,
    solved: false,
    revealed: false,
    checked: false,
    feedback: null,
    guessed: 0,
    skipped: 0,
  };

  function sectionRects(dir, n){
    const rects = [];
    if (dir === null || n <= 1){
      rects.push({ x:0, y:0, w:W, h:H });
    } else if (dir === "v"){
      const sw = W / n;
      for (let i=0;i<n;i++) rects.push({ x:i*sw, y:0, w:sw, h:H });
    } else {
      const sh = H / n;
      for (let i=0;i<n;i++) rects.push({ x:0, y:i*sh, w:W, h:sh });
    }
    return rects;
  }

  // Ключ кольору для порівняння: точний hex або родина кольору.
  function keyFns(exact){
    return {
      hex:  (hex) => exact ? String(hex || DEFAULT).toLowerCase() : (familyOf(hex) || ""),
      band: (b)   => exact ? b.h.toLowerCase() : b.fam,
    };
  }
  // Склеює сусідні однакові ключі (товщина/кількість смуг не важлива).
  function collapseKeys(keys){
    const out = [];
    for (const k of keys) if (!out.length || out[out.length - 1] !== k) out.push(k);
    return out;
  }
  function seqEqual(a, b){
    if (a.length !== b.length) return false;
    for (let i=0;i<a.length;i++) if (a[i] !== b[i]) return false;
    return true;
  }
  function countSeqMatches(a, b){
    if (a.length === b.length){
      let c = 0; for (let i=0;i<a.length;i++) if (a[i] === b[i]) c++; return c;
    }
    const bb = b.slice(); let c = 0;
    for (const x of a){ const j = bb.indexOf(x); if (j >= 0){ bb.splice(j,1); c++; } }
    return c;
  }
  // Однаковий набір кольорів (без урахування порядку).
  function multisetEqual(a, b){
    if (a.length !== b.length) return false;
    const sa = a.slice().sort(); const sb = b.slice().sort();
    for (let i=0;i<sa.length;i++) if (sa[i] !== sb[i]) return false;
    return true;
  }
  // Рендер еталонного прапора (масштабується до контейнера — показуємо в повний розмір).
  function flagSVG(dir, sections){
    const rects = sectionRects(dir, sections.length);
    let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    rects.forEach((r, i) => { s += `<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${sections[i].h}"/>`; });
    return s + `</svg>`;
  }

  // Прапор «складний», якщо має злиті смуги (повтори) або спрощені accept-варіанти.
  FLAGS.forEach((f) => {
    f.complex = (f.accept && f.accept.length > 0) ||
      collapseKeys(f.sections.map((s) => s.h.toLowerCase())).length !== f.sections.length;
  });
  function availCount(cont){
    return FLAGS.filter((f) => f.continent === cont && (state.includeComplex || !f.complex)).length;
  }

  function renderFlag(){
    const rects = sectionRects(state.dir, state.n);
    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
    rects.forEach((r, i) => {
      const fill = state.colors[i] || DEFAULT;
      svg += `<rect data-index="${i}" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" `
           + `fill="${fill}" stroke="rgba(0,0,0,.08)" stroke-width="1"/>`;
    });
    const s = rects[state.selected];
    if (s && state.showSel){
      const ix=s.x+2, iy=s.y+2, iw=s.w-4, ih=s.h-4;
      svg += `<rect x="${ix}" y="${iy}" width="${iw}" height="${ih}" fill="none" stroke="#ffffff" stroke-width="6" pointer-events="none"/>`;
      svg += `<rect x="${ix}" y="${iy}" width="${iw}" height="${ih}" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-dasharray="7 5" pointer-events="none"/>`;
    }
    svg += `</svg>`;
    document.getElementById("flag").innerHTML = svg;
  }

  // Пунктир навколо обраної секції показуємо коротко, потім ховаємо —
  // щоб було видно справжній вигляд прапора (важлива товщина смуг).
  let selTimer = null;
  function flashSelection(){
    state.showSel = true;
    renderFlag();
    if (selTimer) clearTimeout(selTimer);
    selTimer = setTimeout(() => { state.showSel = false; renderFlag(); }, 2500);
  }

  function renderStripes(){
    document.querySelectorAll("[data-dir]").forEach((b) =>
      b.classList.toggle("active", b.dataset.dir === state.dir));
    document.getElementById("nVal").textContent = state.n;
  }

  function renderFamilies(){
    const box = document.getElementById("families");
    box.innerHTML = "";
    FAMILIES.forEach((f) => {
      const b = document.createElement("button");
      b.className = "fam" + (f.key === state.family ? " active" : "");
      b.innerHTML = `<span class="dot" style="background:${f.chip}"></span>${f.name}`;
      b.addEventListener("click", () => { state.family = f.key; renderFamilies(); renderShades(); });
      box.appendChild(b);
    });
  }

  function renderShades(){
    const box = document.getElementById("shades");
    box.innerHTML = "";
    const showCap = state.mode === "constructor";
    const fam = FAMILIES.find((f) => f.key === state.family) || FAMILIES[0];
    fam.shades.forEach((s) => {
      const b = document.createElement("button");
      b.className = "swatch";
      b.title = showCap ? `${fam.name} — ${s.country}` : fam.name;
      b.innerHTML = `<span class="tile" style="background:${s.h}"></span>`
                  + (showCap ? `<span class="cap">${s.country}</span>` : ``);
      b.addEventListener("click", () => {
        applyColor(s.h);
        b.classList.add("tapped");
        setTimeout(() => b.classList.remove("tapped"), 700);
      });
      box.appendChild(b);
    });
  }

  function renderStatus(){
    const total = sectionRects(state.dir, state.n).length;
    const cur = state.colors[state.selected] || DEFAULT;
    let label;
    if (cur === DEFAULT){
      label = "ще не зафарбована";
    } else {
      const fm = FAMILIES.find((f) => f.key === familyOf(cur));
      label = fm ? `<b>${fm.name}</b>` : `<b>${cur}</b>`;
    }
    document.getElementById("status").innerHTML =
      `Обрана секція <b>${state.selected + 1}</b> / ${total} — ${label}`;
  }

  function makeBtn(label, cls, fn){
    const b = document.createElement("button");
    b.className = "btn" + (cls ? " " + cls : "");
    b.textContent = label;
    b.addEventListener("click", fn);
    return b;
  }

  function renderSetup(){
    document.querySelectorAll("[data-cont]").forEach((cb) => {
      cb.checked = state.continents.has(cb.dataset.cont);
    });
    document.getElementById("cont-all").checked = state.continents.size === CONTINENTS.length;
    document.getElementById("setupExact").checked = state.exact;
    document.getElementById("setupComplex").checked = state.includeComplex;
    // лічильники доступних країн (з урахуванням «складних»)
    document.querySelectorAll("[data-cnt]").forEach((el) => {
      el.textContent = "(" + availCount(el.dataset.cnt) + ")";
    });
    const totalAll = FLAGS.filter((f) => state.includeComplex || !f.complex).length;
    document.getElementById("cnt-all").textContent = "(" + totalAll + ")";
    let total = 0;
    state.continents.forEach((c) => { total += availCount(c); });
    document.getElementById("setupTotal").textContent =
      `Доступно прапорів: ${total} із ${totalAll}`;
    document.getElementById("startBtn").disabled = total === 0;
  }

  function renderGame(){
    document.getElementById("targetName").textContent = state.target ? state.target.country : "—";
    document.getElementById("score").textContent = state.guessed - state.skipped;
    document.getElementById("scoreDetail").textContent =
      `Вгадано: ${state.guessed} · Пропущено: ${state.skipped}`;

    const fb = document.getElementById("feedback");
    if (state.feedback && state.feedback.lines){
      const f = state.feedback;
      fb.style.display = "";
      fb.className = "feedback neutral";
      let html = `<div class="fb-verdict ${f.solved ? "mark-ok" : "mark-no"}">${f.solved ? "Зараховано ✅" : "Не зараховано ❌"}</div>`;
      f.lines.forEach((l) => {
        html += `<div class="fb-line"><span>${l.label}:</span> <b class="${l.ok ? "mark-ok" : "mark-no"}">${l.ok ? "✓" : "✗"}</b>`
              + (l.note ? ` <span class="fb-note">(${l.note})</span>` : "") + `</div>`;
      });
      fb.innerHTML = html;
    } else if (state.feedback){
      fb.style.display = "";
      fb.className = "feedback " + (state.feedback.ok ? "ok" : "err");
      fb.textContent = state.feedback.msg;
    } else {
      fb.style.display = "none";
      fb.textContent = "";
    }

    const cbox = document.getElementById("correct");
    if (state.checked && state.target){
      const t2 = state.target;
      const userSecs = state.colors.map((h) => ({ h }));
      cbox.innerHTML =
        `<div class="compare">`
        + `<div><div class="correct-label">Твій вибір:</div><div class="flag">${flagSVG(state.dir, userSecs)}</div></div>`
        + `<div><div class="correct-label">Наш еталон${state.exact ? " (точні)" : ""}:</div><div class="flag">${flagSVG(t2.dir, t2.sections)}</div></div>`
        + `</div>`;
      cbox.style.display = "";
    } else {
      cbox.style.display = "none";
      cbox.innerHTML = "";
    }

    const box = document.getElementById("chActions");
    box.innerHTML = "";
    if (state.solved || state.revealed){
      box.appendChild(makeBtn("Наступний прапор ▶", "primary", nextTarget));
    } else {
      box.appendChild(makeBtn("Перевірити", "primary", check));
      box.appendChild(makeBtn("Показати відповідь", "", reveal));
      box.appendChild(makeBtn("Пропустити ▶", "", nextTarget));
    }
  }

  // --- гра ---
  function pickTarget(){
    const pool = state.pool.length ? state.pool : FLAGS;
    let pick = pool[0];
    if (pool.length > 1){
      do { pick = pool[Math.floor(Math.random() * pool.length)]; }
      while (pick.country === state.lastCountry);
    }
    state.lastCountry = pick.country;
    state.target = pick;
    state.solved = false;
    state.revealed = false;
    state.checked = false;
    state.feedback = null;
    state.dir = null;
    state.n = 1;
    state.colors = [DEFAULT];
    state.selected = 0;
    state.showSel = false;
  }

  function startGame(){
    state.exact = document.getElementById("setupExact").checked;
    state.includeComplex = document.getElementById("setupComplex").checked;
    const pool = FLAGS.filter((f) => state.continents.has(f.continent) && (state.includeComplex || !f.complex));
    if (!pool.length) return;
    state.pool = pool;
    state.guessed = 0;
    state.skipped = 0;
    state.lastCountry = null;
    state.gameStarted = true;
    pickTarget();
    renderAll();
  }

  function newGame(){
    state.gameStarted = false;
    renderAll();
  }

  function nextTarget(){
    if (state.target && !state.solved) state.skipped++;
    pickTarget();
    renderAll();
  }

  function check(){
    const t = state.target;
    if (!t) return;
    state.checked = true;
    const kf = keyFns(state.exact);
    const userSeq = collapseKeys(state.colors.map(kf.hex));
    const dirOk = (state.dir === t.dir);
    const patterns = [t.sections].concat(t.accept || []).map((p) => collapseKeys(p.map(kf.band)));
    const solved = dirOk && patterns.some((p) => seqEqual(userSeq, p));
    let lines;
    if (solved){
      if (!state.solved){ state.solved = true; state.guessed++; }
      lines = [
        { label:"Напрямок",     ok:true },
        { label:"Кольори",      ok:true },
        { label:"Розташування", ok:true },
      ];
    } else {
      const canon = patterns[0];
      const colorsOk = multisetEqual(userSeq, canon);
      const orderOk = seqEqual(userSeq, canon);
      const k = countSeqMatches(userSeq, canon);
      lines = [
        { label:"Напрямок",     ok:dirOk },
        { label:"Кольори",      ok:colorsOk, note: colorsOk ? "" : `${k} з ${canon.length}` },
        { label:"Розташування", ok:orderOk },
      ];
    }
    state.feedback = { solved, lines };
    renderGame();
  }

  function reveal(){
    const t = state.target;
    if (!t) return;
    state.dir = t.dir;
    state.n = t.n;
    state.colors = t.sections.map((s) => s.h);
    state.selected = 0;
    state.revealed = true;
    state.feedback = { ok:true, msg:`Відповідь: ${t.country}. Ось правильний прапор ⬆` };
    renderAll();
  }

  // --- конструктор ---
  function setLayout(dir, n){
    if (n < 1) n = 1;
    if (n > MAXN) n = MAXN;
    if (n === 1) dir = null;
    else if (dir === null) dir = "h";
    state.dir = dir;
    state.n = n;
    const next = [];
    for (let i=0;i<n;i++) next.push(state.colors[i] || DEFAULT);
    state.colors = next;
    if (state.selected >= n) state.selected = 0;
    state.feedback = null;
    renderAll();
  }

  function selectSection(i){
    state.selected = i;
    const fk = familyOf(state.colors[i]);
    if (fk) state.family = fk;
    flashSelection();
    renderFamilies();
    renderShades();
    renderStatus();
  }

  function applyColor(hex){
    state.colors[state.selected] = hex;
    state.feedback = null;
    flashSelection();
    renderStatus();
    if (state.mode === "game" && state.gameStarted) renderGame();
  }

  function reset(){
    state.colors = new Array(Math.max(state.n, 1)).fill(DEFAULT);
    state.selected = 0;
    state.feedback = null;
    renderAll();
  }

  function setMode(m){
    state.mode = m;
    renderAll();
  }

  function renderAll(){
    const showSetup = state.mode === "game" && !state.gameStarted;
    const showGame  = state.mode === "game" && state.gameStarted;
    const showBuilder = state.mode === "constructor" || showGame;

    document.querySelectorAll("[data-mode]").forEach((b) =>
      b.classList.toggle("active", b.dataset.mode === state.mode));
    document.getElementById("setupCard").style.display = showSetup ? "" : "none";
    document.getElementById("gameCard").style.display = showGame ? "" : "none";
    document.getElementById("builder").style.display = showBuilder ? "" : "none";

    renderFlag();
    renderStripes();
    renderFamilies();
    renderShades();
    renderStatus();
    if (showSetup) renderSetup();
    if (showGame) renderGame();
  }

  // --- слухачі ---
  document.getElementById("flag").addEventListener("click", (e) => {
    const t = e.target;
    if (t && t.dataset && t.dataset.index !== undefined){
      selectSection(parseInt(t.dataset.index, 10));
    }
  });
  document.getElementById("reset").addEventListener("click", reset);
  document.querySelectorAll("[data-mode]").forEach((b) =>
    b.addEventListener("click", () => setMode(b.dataset.mode)));

  document.querySelectorAll("[data-cont]").forEach((cb) =>
    cb.addEventListener("change", () => {
      if (cb.checked) state.continents.add(cb.dataset.cont);
      else state.continents.delete(cb.dataset.cont);
      renderSetup();
    }));
  document.getElementById("cont-all").addEventListener("change", (e) => {
    state.continents = new Set(e.target.checked ? CONTINENTS : []);
    renderSetup();
  });
  document.getElementById("setupExact").addEventListener("change", (e) => { state.exact = e.target.checked; });
  document.getElementById("setupComplex").addEventListener("change", (e) => { state.includeComplex = e.target.checked; renderSetup(); });
  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("newGameBtn").addEventListener("click", newGame);

  document.querySelectorAll("[data-dir]").forEach((b) =>
    b.addEventListener("click", () => setLayout(b.dataset.dir, Math.max(state.n, 2))));
  document.getElementById("nMinus").addEventListener("click", () => setLayout(state.dir, state.n - 1));
  document.getElementById("nPlus").addEventListener("click", () => setLayout(state.dir, state.n + 1));

  renderAll();
</script>
</body>
</html>
